name: Deploy to AWS

on:
  push:
    branches: [main, production]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testpass
          MYSQL_DATABASE: nexocrm_test
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
        ports:
          - 3306:3306

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Build backend
        working-directory: backend
        run: npm run build

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  deploy:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd ~/nexocrm
            
            echo "📥 Pulling latest code..."
            git fetch origin
            git pull --ff-only origin main

            echo "🔧 Ensuring Docker Compose v2..."
            if ! docker compose version >/dev/null 2>&1; then
              mkdir -p ~/.docker/cli-plugins
              curl -SL https://github.com/docker/compose/releases/download/v2.27.0/docker-compose-linux-x86_64 -o ~/.docker/cli-plugins/docker-compose
              chmod +x ~/.docker/cli-plugins/docker-compose
            fi
            COMPOSE_CMD="docker compose"

            echo "🧹 Cleaning old Docker artifacts..."
            docker container prune -f || true
            docker image prune -af || true
            docker builder prune -af || true
            docker volume prune -f || true
            
            echo "🔨 Building backend image..."
            set -a && . ./.env.production && set +a
            docker build -t nexocrm-backend:latest ./backend

            echo "🗄️ Applying Prisma migrations..."
            docker run --rm --env-file ./.env.production nexocrm-backend:latest npx prisma migrate deploy

            echo "🔨 Building frontend image..."
            docker build -t nexocrm-frontend:latest ./frontend

            echo "🚀 Starting services..."
            $COMPOSE_CMD -f docker-compose.prod.yml up -d --remove-orphans

            echo "🔎 Validating Next.js static assets..."
            ASSET_PATH=$(curl -s http://127.0.0.1:3000/login | grep -o '/_next/static/[^"[:space:]]*layout\.css' | head -n 1 || true)
            if [ -n "$ASSET_PATH" ]; then
              curl -sf "http://127.0.0.1:3000$ASSET_PATH" >/dev/null
              echo "✅ Next asset available: $ASSET_PATH"
            else
              echo "⚠️ Could not extract layout asset path from HTML; continuing."
            fi
            
            echo "✅ Waiting for containers to stabilize..."
            sleep 5
            
            echo "✅ Checking container status..."
            docker ps -a --filter "name=nexocrm"
            
            echo "✅ Deployment complete!"

  notify:
    needs: deploy
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Notify success
        if: success()
        run: echo "✅ Deployment to EC2 completed successfully!"
        
      - name: Notify failure
        if: failure()
        run: echo "❌ Deployment failed. Check logs above."