name: Deploy to AWS

on:
  push:
    branches: [main, production]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testpass
          MYSQL_DATABASE: nexocrm_test
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
        ports:
          - 3306:3306

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Build backend
        working-directory: backend
        run: npm run build

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  deploy:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd ~/nexocrm
            
            echo "📥 Pulling latest code..."
            git fetch origin
            git pull --ff-only origin main
            
            echo "🔨 Cleaning up old containers..."
            docker-compose -f docker-compose.prod.yml down --remove-orphans || true
            
            echo "🔨 Rebuilding backend..."
            docker build -t nexocrm-backend:latest ./backend
            
            echo "🔨 Rebuilding frontend..."
            docker build -t nexocrm-frontend:latest ./frontend
            
            echo "🚀 Starting services..."
            set -a && . ./.env.production && set +a
            docker-compose -f docker-compose.prod.yml up -d
            
            echo "✅ Waiting for containers to stabilize..."
            sleep 5
            
            echo "✅ Checking container status..."
            docker ps -a --filter "name=nexocrm"
            
            echo "✅ Deployment complete!"

  notify:
    needs: deploy
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Notify success
        if: success()
        run: echo "✅ Deployment to EC2 completed successfully!"
        
      - name: Notify failure
        if: failure()
        run: echo "❌ Deployment failed. Check logs above."